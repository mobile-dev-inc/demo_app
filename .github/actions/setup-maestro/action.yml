name: Set up Maestro
description: Install Java 21 and the latest Maestro CLI

runs:
  using: composite
  steps:
    - name: Set up Java
      uses: actions/setup-java@v5
      with:
        distribution: zulu
        java-version: 21

    - name: Install Maestro CLI
      shell: bash
      run: |
        curl -fsSL "https://get.maestro.mobile.dev" | bash
        echo "$HOME/.maestro/bin" >> $GITHUB_PATH
